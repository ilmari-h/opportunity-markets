[package]
name = "arcium-crypto"
version = "0.1.0"
edition = "2021"
description = "Pure-Rust, no_std reimplementation of Arcium's Rescue-Prime hash and Rescue cipher over F_{2^255-19}, for on-chain (Solana BPF) decryption of Arcium ciphertexts."

[lib]
name = "arcium_crypto"

[features]
default = []
# Enable host-side helpers like SHAKE256-based round-constant derivation. Off by
# default so the crate stays small and BPF-friendly; on-chain code uses
# pre-baked constants generated from this feature.
host = ["dep:sha3", "dep:hex"]

[dependencies]
fiat-crypto = { version = "0.3", default-features = false }
sha3 = { version = "0.10", optional = true, default-features = false }
hex = { version = "0.4", optional = true, default-features = false, features = ["alloc"] }

[dev-dependencies]
sha3 = "0.10"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
